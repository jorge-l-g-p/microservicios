server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy opcional por si quieres evitar problemas de CORS en desarrollo
    # location /api/ {
    #    proxy_pass http://api-gateway:4000/;
    # }
}