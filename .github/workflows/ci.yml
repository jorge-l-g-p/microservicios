name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [employees, tasks, attendance, payroll, reports, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias - ${{ matrix.service }}
        run: npm ci
        working-directory: ./${{ matrix.service }}

      - name: Ejecutar tests - ${{ matrix.service }}
        run: npm test
        working-directory: ./${{ matrix.service }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [employees, tasks, attendance, payroll, reports, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependencias - ${{ matrix.service }}
        run: npm ci
        working-directory: ./${{ matrix.service }}

      - name: Ejecutar ESLint - ${{ matrix.service }}
        run: npm run lint
        working-directory: ./${{ matrix.service }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - service: employees
            image: erp-employees
          - service: tasks
            image: erp-tasks
          - service: attendance
            image: erp-attendance
          - service: payroll
            image: erp-payroll
          - service: reports
            image: erp-reports
          - service: gateway
            image: erp-gateway
          - service: frontend
            image: erp-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Docker - ${{ matrix.service }}
        run: docker build -t ${{ matrix.image }} ./${{ matrix.service }}
